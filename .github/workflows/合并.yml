name: 合并 linux-4.19.y 到电池修复测试（添加新文件）

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '源分支'
        required: true
        default: 'linux-4.19.y'
      target_branch:
        description: '目标分支'
        required: true
        default: '电池修复测试'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-branches:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tem423/linux-android-msm-lenovo-p12
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 拉取源分支
        run: |
          git fetch origin ${{ github.event.inputs.source_branch }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 执行合并（添加新文件，保留现有文件）
        id: merge
        continue-on-error: true
        run: |
          git merge --no-commit --no-ff origin/${{ github.event.inputs.source_branch }} || true
          
          echo "=== 合并策略：添加新文件，保留现有文件 ==="
          
          # 处理删除的文件（源分支删除了，但目标分支保留）
          DELETED_FILES=$(git diff --cached --name-only --diff-filter=D)
          if [ -n "$DELETED_FILES" ]; then
            echo "恢复被删除的文件（保留本地）："
            echo "$DELETED_FILES"
            git reset HEAD $DELETED_FILES 2>/dev/null || true
            git checkout -- $DELETED_FILES 2>/dev/null || true
          fi
          
          # 处理冲突的文件（优先保留目标分支版本）
          CONFLICT_FILES=$(git diff --cached --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "冲突文件（保留目标分支版本）："
            echo "$CONFLICT_FILES"
            git checkout --ours $CONFLICT_FILES 2>/dev/null || true
            git add $CONFLICT_FILES 2>/dev/null || true
          fi
          
          # 检查最终状态
          if git diff --cached --name-only --diff-filter=U | grep -q .; then
            echo "status=conflicts" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送
        if: steps.merge.outputs.status == 'success'
        run: |
          git commit -m "Merge branch '${{ github.event.inputs.source_branch }}' into '${{ github.event.inputs.target_branch }}'

策略：添加新文件，保留现有文件
- 新增文件: 已添加
- 删除文件: 已恢复（保留本地）
- 冲突文件: 保留目标分支版本"
          
          git push origin ${{ github.event.inputs.target_branch }}
          echo "合并成功！已推送到 ${{ github.event.inputs.target_branch }}"

      - name: 如果有冲突，创建 PR 手动处理
        uses: peter-evans/create-pull-request@v6
        if: steps.merge.outputs.status == 'conflicts'
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "WIP: 合并上游（保留原厂文件，有冲突）"
          title: "合并上游 ${{ github.event.inputs.upstream_ref }}（优先保留原厂文件）"
          body: |
            自动合并时发生冲突，已优先保留原厂文件。
            请手动检查并完成合并。
          branch: auto-merge-add-new-files
          base: ${{ github.event.inputs.target_branch }}
          labels: automated pr, add-new-files