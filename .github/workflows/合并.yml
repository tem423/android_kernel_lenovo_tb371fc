name: 🔀 手动合并上游 Linux 4.19

on:
  push:
   on:
    - tb371fc
    description: '手动触发内核合并（仅创建 PR，不自动合并）'
    inputs:
      # 上游配置
      upstream_source:
        description: '上游来源'
        required: true
        default: 'linux-stable'
        type: choice
        options:
          - linux-stable
          - android-common
          - custom
      upstream_branch:
        description: '上游分支名称'
        required: false
        default: 'linux-4.19.y'
      custom_repo:
        description: '自定义仓库 URL（当上游来源为 custom 时）'
        required: false
        default: ''
      custom_branch:
        description: '自定义分支名称'
        required: false
        default: 'master'
      
      # 目标配置
      target_branch:
        description: '目标分支（PR 将指向此分支）'
        required: true
        default: 'tb371fc'
      merge_strategy:
        description: '合并策略'
        required: true
        default: 'patience'
        type: choice
        options:
          - recursive
          - ours
          - theirs
          - patience
      auto_resolve:
        description: '是否自动解决冲突'
        required: false
        default: true
        type: boolean
      
      # 高级选项
      commit_message:
        description: '自定义提交信息（可选）'
        required: false
        default: ''

# 权限配置
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

# 环境变量
env:
  UPSTREAM_URL: ''
  UPSTREAM_BRANCH: ''
  TARGET_BRANCH: ''
  MERGE_STRATEGY: ''
  AUTO_RESOLVE: ''

jobs:
  # ============================================
  # 主合并任务 - 只创建 PR，不自动合并到目标分支
  # ============================================
  create-merge-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # ---------- 1. 检出代码 ----------
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.target_branch }}
          
      # ---------- 2. 设置环境变量 ----------
      - name: ⚙️ 设置环境变量
        run: |
          echo "TARGET_BRANCH=${{ github.event.inputs.target_branch }}" >> $GITHUB_ENV
          echo "MERGE_STRATEGY=${{ github.event.inputs.merge_strategy }}" >> $GITHUB_ENV
          echo "AUTO_RESOLVE=${{ github.event.inputs.auto_resolve }}" >> $GITHUB_ENV
          
          # 配置上游 URL
          case "${{ github.event.inputs.upstream_source }}" in
            "linux-stable")
              echo "UPSTREAM_URL=https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git" >> $GITHUB_ENV
              echo "UPSTREAM_BRANCH=${{ github.event.inputs.upstream_branch || 'linux-4.19.y' }}" >> $GITHUB_ENV
              ;;
            "android-common")
              echo "UPSTREAM_URL=https://android.googlesource.com/kernel/common" >> $GITHUB_ENV
              echo "UPSTREAM_BRANCH=${{ github.event.inputs.upstream_branch || 'android-4.19-stable' }}" >> $GITHUB_ENV
              ;;
            "custom")
              echo "UPSTREAM_URL=${{ github.event.inputs.custom_repo }}" >> $GITHUB_ENV
              echo "UPSTREAM_BRANCH=${{ github.event.inputs.custom_branch || 'master' }}" >> $GITHUB_ENV
              ;;
          esac
          
      # ---------- 3. 配置 Git ----------
      - name: 🔧 配置 Git
        run: |
          git config --global user.name "Lenovo Kernel Merge Bot"
          git config --global user.email "kernel-merge@lenovo-p12.local"
          git config --global core.autocrlf false
          
          # 注册合并驱动
          git config --global merge.ours.driver "true"
          git config --global merge.theirs.driver "false"
          git config --global merge.text.name "Text Merge"
          git config --global merge.text.driver "git merge-file --stdout %A %O %B > %A"
          
      # ---------- 4. 添加上游仓库 ----------
      - name: 🔗 添加上游仓库
        run: |
          git remote add upstream $UPSTREAM_URL
          git fetch upstream --depth=1000 $UPSTREAM_BRANCH
          echo "✅ 已添加上游: $UPSTREAM_URL"
          echo "📌 上游分支: $UPSTREAM_BRANCH"
          
      # ---------- 5. 获取版本信息 ----------
      - name: 📊 获取版本信息
        id: version
        run: |
          CURRENT_COMMIT=$(git rev-parse --short HEAD)
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          
          UPSTREAM_COMMIT=$(git rev-parse --short upstream/$UPSTREAM_BRANCH)
          echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          echo "📌 当前提交 ($TARGET_BRANCH): $CURRENT_COMMIT"
          echo "📌 上游提交: $UPSTREAM_COMMIT"
          
      # ---------- 6. 检查是否需要合并 ----------
      - name: 🔍 检查是否需要合并
        id: check
        run: |
          if git merge-base --is-ancestor upstream/$UPSTREAM_BRANCH HEAD; then
            echo "need_merge=false" >> $GITHUB_OUTPUT
            echo "✅ 当前分支已包含上游所有更新，无需合并"
          else
            echo "need_merge=true" >> $GITHUB_OUTPUT
            echo "⚠️ 发现新更新，将创建合并 PR"
          fi
          
      # ---------- 7. 创建合并分支 ----------
      - name: 🌿 创建合并分支
        if: steps.check.outputs.need_merge == 'true'
        run: |
          MERGE_BRANCH="merge/upstream-${{ steps.version.outputs.timestamp }}"
          git checkout -b $MERGE_BRANCH
          echo "MERGE_BRANCH=$MERGE_BRANCH" >> $GITHUB_ENV
          echo "✅ 已创建分支: $MERGE_BRANCH"
          
      # ---------- 8. 执行合并 ----------
      - name: 🔀 执行合并
        if: steps.check.outputs.need_merge == 'true'
        id: merge
        continue-on-error: true
        run: |
          MERGE_OPTS="--no-edit"
          
          case "$MERGE_STRATEGY" in
            "ours") MERGE_OPTS="$MERGE_OPTS -X ours" ;;
            "theirs") MERGE_OPTS="$MERGE_OPTS -X theirs" ;;
            "patience") MERGE_OPTS="$MERGE_OPTS --strategy-option=patience" ;;
            "recursive") MERGE_OPTS="$MERGE_OPTS --strategy-option=recursive" ;;
          esac
          
          echo "执行: git merge upstream/$UPSTREAM_BRANCH $MERGE_OPTS"
          
          if git merge upstream/$UPSTREAM_BRANCH $MERGE_OPTS 2>&1 | tee merge-output.txt; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            echo "✅ 合并成功，无冲突"
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "has_conflict=true" >> $GITHUB_OUTPUT
            echo "⚠️ 合并时发现冲突"
          fi
          
      # ---------- 9. 自动解决冲突 ----------
      - name: 🤖 自动解决冲突
        if: steps.merge.outputs.has_conflict == 'true' && env.AUTO_RESOLVE == 'true'
        id: auto-resolve
        run: |
          cat > /tmp/resolve-conflicts.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          echo "🔧 开始自动解决冲突..."
          
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -z "$CONFLICT_FILES" ]; then
            exit 0
          fi
          
          RESOLVED=0
          MANUAL=0
          
          for file in $CONFLICT_FILES; do
            echo "处理: $file"
            
            # defconfig 冲突 - 保留 Lenovo 配置
            if [[ "$file" == *"defconfig" ]]; then
              sed -i '/^<<<<<<< /,/^=======/ {
                /CONFIG_LENOVO/!d
                /CONFIG_TB37/!d
                /CONFIG_MSM/!d
              }' "$file"
              sed -i '/^=======/,/^>>>>>>> /d' "$file"
              sed -i '/^<<<<<<< /d' "$file"
              sed -i '/^=======/d' "$file"
              sed -i '/^>>>>>>> /d' "$file"
              echo "  ✅ 已解决 defconfig 冲突"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # techpack 目录 - 保留厂商版本
            if [[ "$file" == techpack/* ]]; then
              git checkout --ours "$file"
              git add "$file"
              echo "  ✅ 保留厂商版本: $file"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # 设备树 - 保留我们的版本
            if [[ "$file" == arch/arm64/boot/dts/* ]]; then
              git checkout --ours "$file"
              git add "$file"
              echo "  ✅ 保留设备树: $file"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # Makefile - 合并双方
            if [[ "$file" == *"Makefile" ]]; then
              OUR_OBJS=$(sed -n '/<<<<<<< /,/=======/p' "$file" | grep 'obj-')
              THEIR_OBJS=$(sed -n '/=======/,/>>>>>>>/p' "$file" | grep 'obj-')
              if [ -n "$OUR_OBJS" ] || [ -n "$THEIR_OBJS" ]; then
                echo -e "$OUR_OBJS\n$THEIR_OBJS" | sort -u > /tmp/merged_objs
                sed -i '/<<<<<<< /,/>>>>>>>/c\'"$(cat /tmp/merged_objs)" "$file"
                echo "  ✅ 合并 Makefile 条目"
                RESOLVED=$((RESOLVED + 1))
                continue
              fi
            fi
            
            # 检查是否还有冲突标记
            if grep -q '<<<<<<<' "$file"; then
              echo "  ❌ 需要人工处理: $file"
              MANUAL=$((MANUAL + 1))
            else
              git add "$file"
              RESOLVED=$((RESOLVED + 1))
            fi
          done
          
          echo "✅ 自动解决: $RESOLVED 个"
          echo "⚠️ 需人工处理: $MANUAL 个"
          
          if [ $MANUAL -gt 0 ]; then
            exit 1
          fi
          exit 0
SCRIPT
          
          chmod +x /tmp/resolve-conflicts.sh
          
          if /tmp/resolve-conflicts.sh; then
            echo "status=success" >> $GITHUB_OUTPUT
            git commit --no-edit -m "[auto] 自动解决合并冲突"
            echo "✅ 所有冲突已自动解决"
          else
            echo "status=partial" >> $GITHUB_OUTPUT
            echo "⚠️ 部分冲突无法自动解决"
          fi
          
      # ---------- 10. 提交合并（如果有成功合并或无冲突）----------
      - name: 💾 提交合并
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.check.outputs.need_merge == 'true'
        run: |
          if [ -n "${{ github.event.inputs.commit_message }}" ]; then
            COMMIT_MSG="${{ github.event.inputs.commit_message }}"
          else
            COMMIT_MSG="Merge upstream $UPSTREAM_BRANCH into $TARGET_BRANCH
          
          上游仓库: $UPSTREAM_URL
          上游提交: ${{ steps.version.outputs.upstream_commit }}
          
          合并策略: $MERGE_STRATEGY
          自动解决冲突: $AUTO_RESOLVE
          
          ---
          此 PR 由 GitHub Actions 自动创建，请审核后手动合并
          "
          fi
          
          git commit --amend -m "$COMMIT_MSG" 2>/dev/null || git commit -m "$COMMIT_MSG"
          echo "✅ 已创建合并提交"
          
      # ---------- 11. 推送分支（只推送 PR 分支，不推送目标分支）----------
      - name: 🚀 推送 PR 分支
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.check.outputs.need_merge == 'true'
        run: |
          git push origin $MERGE_BRANCH
          echo "✅ 已推送分支: $MERGE_BRANCH"
          echo "⚠️ 注意: 未自动合并到 $TARGET_BRANCH，请手动审核后合并"
          
      # ---------- 12. 创建 Pull Request（指向目标分支）----------
      - name: 🔀 创建 Pull Request
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.check.outputs.need_merge == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Merge upstream ${{ env.UPSTREAM_BRANCH }}"
          title: "🔀 [请手动审核] 上游 ${{ env.UPSTREAM_BRANCH }} 更新"
          body: |
            ## 📦 上游内核更新合并请求
            
            ### ⚠️ 重要提示
            
            **此 PR 不会自动合并**，请审核通过后手动合并到 `${{ env.TARGET_BRANCH }}`。
            
            ### 合并信息
            
            | 项目 | 信息 |
            |------|------|
            | 上游仓库 | `${{ env.UPSTREAM_URL }}` |
            | 上游分支 | `${{ env.UPSTREAM_BRANCH }}` |
            | 上游提交 | `${{ steps.version.outputs.upstream_commit }}` |
            | 当前提交 | `${{ steps.version.outputs.current_commit }}` |
            | 合并策略 | `${{ env.MERGE_STRATEGY }}` |
            
            ### 冲突处理状态
            
            ${{ steps.merge.outputs.has_conflict == 'true' && '⚠️ 合并时发现冲突，已尝试自动解决' || '✅ 合并无冲突' }}
            ${{ steps.auto-resolve.outputs.status == 'success' && '✅ 所有冲突已自动解决' || '' }}
            ${{ steps.auto-resolve.outputs.status == 'partial' && '⚠️ 部分冲突需要人工处理' || '' }}
            
            ### 审核清单
            
            - [ ] 检查代码变更是否合理
            - [ ] 验证编译是否通过
            - [ ] 确认功能正常
            - [ ] **手动合并此 PR**
            
            ### 手动合并命令
            
            ```bash
            git checkout ${{ env.TARGET_BRANCH }}
            git pull origin ${{ env.TARGET_BRANCH }}
            git merge --no-ff ${{ env.MERGE_BRANCH }}
            git push origin ${{ env.TARGET_BRANCH }}
            ```
            
            ---
            *此 PR 由 GitHub Actions 自动创建，请审核后手动合并*
          branch: ${{ env.MERGE_BRANCH }}
          base: ${{ env.TARGET_BRANCH }}
          labels: |
            manual-merge-required
            upstream-update
            do-not-auto-merge
          delete-branch: true
          
      # ---------- 13. 创建 Issue（合并失败需人工处理）----------
      - name: 🚨 创建 Issue（需要人工处理冲突）
        if: steps.auto-resolve.outputs.status == 'partial' || (steps.merge.outputs.has_conflict == 'true' && env.AUTO_RESOLVE == 'false')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let conflictFiles = '';
            try {
              conflictFiles = fs.readFileSync('merge-output.txt', 'utf8').slice(-500);
            } catch(e) {
              conflictFiles = '无法读取合并输出';
            }
            
            let body = `## ⚠️ 合并冲突需要人工处理
            
            上游分支 **${process.env.UPSTREAM_BRANCH}** 的合并尝试发现冲突，无法自动解决。
            
            ### 合并信息
            
            - **目标分支**: ${process.env.TARGET_BRANCH}
            - **上游仓库**: ${process.env.UPSTREAM_URL}
            - **上游分支**: ${process.env.UPSTREAM_BRANCH}
            
            ### 冲突详情
            
            \`\`\`
            ${conflictFiles}
            \`\`\`
            
            ### 解决步骤
            
            1. 克隆仓库
            
            \`\`\`bash
            git clone ${{ github.server_url }}/${{ github.repository }}.git
            cd ${{ github.repository }}
            git checkout ${process.env.TARGET_BRANCH}
            \`\`\`
            
            2. 手动合并并解决冲突
            
            \`\`\`bash
            git remote add upstream ${process.env.UPSTREAM_URL}
            git fetch upstream ${process.env.UPSTREAM_BRANCH}
            git merge upstream/${process.env.UPSTREAM_BRANCH}
            # 手动解决冲突后
            git add .
            git merge --continue
            git push origin ${process.env.TARGET_BRANCH}
            \`\`\`
            
            ---
            🤖 此 Issue 由自动化系统自动创建
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Merge Conflict] 需要手动解决冲突 - ${new Date().toISOString().slice(0, 10)}`,
              body: body,
              labels: ['merge-conflict', 'manual-intervention']
            });
        env:
          UPSTREAM_BRANCH: ${{ env.UPSTREAM_BRANCH }}
          UPSTREAM_URL: ${{ env.UPSTREAM_URL }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          
      # ---------- 14. 输出总结 ----------
      - name: 📋 输出总结
        run: |
          echo "=========================================="
          echo "📊 合并执行总结"
          echo "=========================================="
          echo "目标分支: $TARGET_BRANCH"
          echo "上游: $UPSTREAM_URL -> $UPSTREAM_BRANCH"
          echo "合并状态: ${{ steps.merge.outputs.status || '未执行' }}"
          echo "冲突状态: ${{ steps.merge.outputs.has_conflict || '无' }}"
          echo "自动解决: ${{ steps.auto-resolve.outputs.status || '未启用' }}"
          echo "=========================================="
          echo ""
          echo "⚠️ 重要: 未自动合并到 $TARGET_BRANCH"
          echo "   请查看创建的 PR，审核后手动合并"
          echo "=========================================="
          
      # ---------- 15. 上传日志 ----------
      - name: 📤 上传合并日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-logs-${{ steps.version.outputs.timestamp }}
          path: |
            merge-output.txt
          retention-days: 30