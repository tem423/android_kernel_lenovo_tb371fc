name: 合并 linux-4.19.y 到电池修复测试（添加新文件）

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '源分支'
        required: true
        default: 'linux-4.19.y'
      target_branch:
        description: '目标分支'
        required: true
        default: '电池修复测试'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-branches:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tem423/linux-android-msm-lenovo-p12
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 拉取源分支
        run: |
          git fetch origin ${{ github.event.inputs.source_branch }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 执行合并（添加新文件，保留现有文件）
        id: merge
        continue-on-error: true
        run: |
          # 开始合并源分支到目标分支
          git merge --no-commit --no-ff origin/${{ github.event.inputs.source_branch }} || true
          
          echo "=== 合并策略：添加新文件，保留现有文件 ==="
          
          # 1. 处理删除的文件（源分支删除了，但目标分支保留）
          DELETED_FILES=$(git diff --cached --name-only --diff-filter=D)
          if [ -n "$DELETED_FILES" ]; then
            echo "恢复被删除的文件（保留本地）："
            echo "$DELETED_FILES"
            git reset HEAD $DELETED_FILES 2>/dev/null || true
            git checkout -- $DELETED_FILES 2>/dev/null || true
          fi
          
          # 2. 处理冲突的文件（优先保留目标分支版本）
          CONFLICT_FILES=$(git diff --cached --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "冲突文件（保留目标分支版本）："
            echo "$CONFLICT_FILES"
            git checkout --ours $CONFLICT_FILES 2>/dev/null || true
            git add $CONFLICT_FILES 2>/dev/null || true
          fi
          
          # 3. 新增的文件 - 保留（自动已经在暂存区，不需要额外处理）
          ADDED_FILES=$(git diff --cached --name-only --diff-filter=A)
          if [ -n "$ADDED_FILES" ]; then
            echo "新增文件（保留并添加）："
            echo "$ADDED_FILES"
            # 新增文件已经在暂存区，保持原样
          fi
          
          # 4. 检查最终状态
          if git diff --cached --name-only --diff-filter=U | grep -q .; then
            echo "status=conflicts" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi
          
          echo "=== 处理完成 ==="
          echo "新增文件数: $(echo "$ADDED_FILES" | wc -l)"
          echo "冲突文件数: $(echo "$CONFLICT_FILES" | wc -l)"
          echo "恢复删除文件数: $(echo "$DELETED_FILES" | wc -l)"

      - name: 提交并推送
        if: steps.merge.outputs.status == 'success'
        run: |
          git commit -m "Merge branch '${{ github.event.inputs.source_branch }}' into '${{ github.event.inputs.target_branch }}'

策略：添加新文件，保留现有文件
- 新增文件: 已添加
- 删除文件: 已恢复（保留本地）
- 冲突文件: 保留目标分支版本"
          
          git push origin ${{ github.event.inputs.target_branch }}
          echo "✅ 合并成功！已推送到 ${{ github.event.inputs.target_branch }}"

      - name: 如果有冲突，创建 PR 手动处理
        uses: peter-evans/create-pull-request@v6
        if: steps.merge.outputs.status == 'conflicts'
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "WIP: 合并 ${{ github.event.inputs.source_branch }} 到 ${{ github.event.inputs.target_branch }}"
          title: "合并 ${{ github.event.inputs.source_branch }} 到 ${{ github.event.inputs.target_branch }}（添加新文件）"
          body: |
            ## 合并策略说明
            
            此合并遵循以下规则：
            - ✅ **添加**源分支新增的文件
            - ❌ **不删除**目标分支现有的文件
            - ✅ **只更新**双方都存在的文件（如有冲突，保留目标分支版本）
            
            ## 手动处理步骤
            
            ```bash
            git checkout ${{ github.event.inputs.target_branch }}
            git merge origin/${{ github.event.inputs.source_branch }}
            
            # 恢复删除文件（保留本地）
            git diff --cached --name-only --diff-filter=D | xargs -r git reset HEAD
            git diff --cached --name-only --diff-filter=D | xargs -r git checkout --
            
            # 保留目标分支版本（冲突时）
            git checkout --ours .
            git add .
            
            git commit -m "Merge ${{ github.event.inputs.source_branch }} into ${{ github.event.inputs.target_branch }}"
            git push origin ${{ github.event.inputs.target_branch }}
            ```
          branch: auto-merge-add-new-files
          base: ${{ github.event.inputs.target_branch }}
          labels: automated pr, add-new-files