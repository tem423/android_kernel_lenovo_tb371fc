name: 合并上游 4.19（保留原厂文件）

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游分支/标签'
        required: true
        default: 'linux-4.19.y'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-with-vendor-priority:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tem423/linux-android-msm-lenovo-p12
          ref: 电池修复测试
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 添加上游仓库
        run: |
          git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
          git fetch upstream --tags --force

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 执行合并（优先保留原厂文件）
        id: merge
        continue-on-error: true
        run: |
          git merge --no-commit --no-ff upstream/${{ github.event.inputs.upstream_ref }} || true
          
          echo "=== 优先保留联想原厂文件 ==="
          git checkout --ours .
          git add .
          
          if git diff --cached --name-only --diff-filter=U | grep -q .; then
            echo "status=conflicts" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 如果没有冲突，直接提交并推送
        if: steps.merge.outputs.status == 'success'
        run: |
          git commit -m "Merge upstream ${{ github.event.inputs.upstream_ref }}"
          git push origin 电池修复测试

      - name: 如果有冲突，创建 PR 手动处理
        uses: peter-evans/create-pull-request@v6
        if: steps.merge.outputs.status == 'conflicts'
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "WIP: 合并上游（保留原厂文件，有冲突）"
          title: "合并上游 ${{ github.event.inputs.upstream_ref }}（优先保留原厂文件）"
          body: |
            自动合并时发生冲突，已优先保留原厂文件。
            请手动检查并完成合并。
          branch: merge-upstream-prefer-vendor
          base: 电池修复测试
          labels: automated pr, merge conflict