name: Merge Linux 4.19 Stable Upstream

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游分支/标签'
        required: true
        default: 'linux-4.19.y'

permissions:
  contents: write

jobs:
  merge-upstream:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tem423/linux-android-msm-lenovo-p12
          ref: 电池修复测试
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - run: |
          git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
          git fetch upstream --tags --force

      - name: Merge
        id: merge
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge --no-commit --no-ff upstream/${{ github.event.inputs.upstream_ref }} || true
          if git diff --cached --quiet; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=conflicts" >> $GITHUB_OUTPUT
          fi

      - name: Push if success
        if: steps.merge.outputs.status == 'success'
        run: |
          git commit -m "Merge upstream ${{ github.event.inputs.upstream_ref }}"
          git push origin 电池修复测试

      - uses: peter-evans/create-pull-request@v6
        if: steps.merge.outputs.status == 'conflicts'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Merge upstream ${{ github.event.inputs.upstream_ref }}
          body: Please resolve conflicts.
          branch: auto-merge/upstream
          base: 电池修复测试