#!/bin/bash
# 针对 Lenovo P12 内核的自动化合并脚本集
# 仓库: https://github.com/tem423/linux-android-msm-lenovo-p12

# 1. 克隆仓库
git clone https://github.com/tem423/linux-android-msm-lenovo-p12.git
cd linux-android-msm-lenovo-p12

# 2. 创建新分支
git checkout -b feature/auto-merge-lenovo-p12

# 3. 创建目录结构
mkdir -p .github/workflows scripts

# 4. 创建 .gitattributes (针对 Lenovo P12 的优化配置)
cat > .gitattributes << 'EOF'
# ============================================
# Lenovo P12 内核合并策略配置
# 基础: msm-4.19 + Lenovo 定制
# ============================================

# ---------------------------
# 联想/高通厂商驱动 - 保留我们的版本
# ---------------------------
techpack/                                    merge=ours
drivers/lenovo/                              merge=ours
drivers/soc/qcom/                            merge=ours
drivers/gpu/msm/                             merge=ours
drivers/platform/msm/                        merge=ours
drivers/clk/qcom/                            merge=ours
drivers/media/platform/msm/                  merge=ours
drivers/char/adsprpc.c                       merge=ours
drivers/char/ion/                            merge=ours
drivers/misc/                                merge=ours
drivers/net/ethernet/msm/                    merge=ours
drivers/usb/dwc3/                            merge=ours
drivers/input/touchscreen/                   merge=ours
drivers/power/supply/qcom/                   merge=ours
drivers/thermal/qcom/                        merge=ours
drivers/regulator/qcom-*                     merge=ours
drivers/pinctrl/qcom/                        merge=ours
drivers/interconnect/qcom/                   merge=ours

# 设备树 - 保留联想版本
arch/arm64/boot/dts/qcom/                    merge=ours
arch/arm64/boot/dts/lenovo/                  merge=ours

# 联想专用配置文件
arch/arm64/configs/tb371fc_defconfig         merge=ours
arch/arm64/configs/lenovo_*                  merge=ours

# 联想专用头文件
include/linux/lenovo/                        merge=ours
include/linux/msm_*                          merge=ours
include/soc/qcom/                            merge=ours

# ---------------------------
# 公共内容 - 优先采用上游
# ---------------------------
COPYING                                      merge=theirs
LICENSES/                                    merge=theirs
Documentation/                               merge=theirs
MAINTAINERS                                  merge=theirs
CREDITS                                      merge=theirs
README                                       merge=theirs
*.rst                                        merge=theirs

# ---------------------------
# 公共驱动子系统 - 智能合并
# ---------------------------
drivers/usb/host/                            merge=text
drivers/usb/core/                            merge=text
drivers/i2c/busses/                          merge=text
drivers/mmc/host/                            merge=text
drivers/input/                               merge=text
drivers/char/watchdog/                       merge=text
drivers/rtc/                                 merge=text
drivers/pwm/                                 merge=text
drivers/thermal/                             merge=text
drivers/cpufreq/                             merge=text
drivers/cpuidle/                             merge=text

# 文件系统
fs/ext4/                                     merge=text
fs/f2fs/                                     merge=text
fs/sdcardfs/                                 merge=text

# 网络
net/bluetooth/                               merge=text
net/wireless/                                merge=text
net/core/                                    merge=text

# 核心内核
kernel/sched/                                merge=text
kernel/locking/                              merge=text
kernel/rcu/                                  merge=text
kernel/irq/                                  merge=text
mm/                                          merge=text

# 头文件
include/linux/                               merge=text
include/asm-generic/                         merge=text
EOF

# 5. 创建冲突自动解决脚本
cat > scripts/auto-resolve-conflicts.sh << 'EOF'
#!/bin/bash
# Lenovo P12 内核专用冲突解决脚本

set -e

RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m'

log_info() { echo -e "${GREEN}[INFO]${NC} $1"; }
log_warn() { echo -e "${YELLOW}[WARN]${NC} $1"; }
log_error() { echo -e "${RED}[ERROR]${NC} $1"; }

CONFLICT_COUNT=0
RESOLVED_COUNT=0
MANUAL_COUNT=0
MANUAL_FILES=()

# 解决头文件路径冲突
resolve_include_path() {
    local file="$1"
    local changed=0
    
    # Lenovo/高通常见头文件映射
    declare -A path_maps=(
        ["linux/msm_ion.h"]="linux/dma-heap.h"
        ["linux/msm_drm.h"]="drm/msm_drm.h"
        ["soc/qcom/msm_qmi.h"]="linux/soc/qcom/qmi.h"
    )
    
    for old_path in "${!path_maps[@]}"; do
        new_path="${path_maps[$old_path]}"
        if grep -q "<$old_path>" "$file"; then
            sed -i "s|<$old_path>|<$new_path>|g" "$file"
            changed=1
        fi
    done
    
    if [[ $changed -eq 1 ]]; then
        log_info "  - 更新 $file 中的头文件路径"
        return 0
    fi
    return 1
}

# 解决 defconfig 冲突
resolve_defconfig() {
    local file="$1"
    if [[ "$file" == *"defconfig"* ]]; then
        # 保留联想的配置选项
        sed -i '/<<<<<<< /,/=======/ {
            /CONFIG_LENOVO/d
            /CONFIG_MSM/d
        }' "$file"
        sed -i '/=======/,/>>>>>>> /d' "$file"
        sed -i '/<<<<<<< /d' "$file"
        sed -i '/=======/d' "$file"
        sed -i '/>>>>>>> /d' "$file"
        log_info "  - 清理 $file 的 defconfig 冲突"
        return 0
    fi
    return 1
}

# 主处理函数
process_conflicts() {
    local conflict_files=$(git diff --name-only --diff-filter=U)
    
    if [[ -z "$conflict_files" ]]; then
        log_info "没有检测到冲突"
        return 0
    fi
    
    CONFLICT_COUNT=$(echo "$conflict_files" | wc -l)
    log_warn "检测到 $CONFLICT_COUNT 个冲突文件"
    
    for file in $conflict_files; do
        log_info "处理: $file"
        
        if resolve_include_path "$file"; then
            RESOLVED_COUNT=$((RESOLVED_COUNT + 1))
            git add "$file"
        elif resolve_defconfig "$file"; then
            RESOLVED_COUNT=$((RESOLVED_COUNT + 1))
            git add "$file"
        else
            MANUAL_COUNT=$((MANUAL_COUNT + 1))
            MANUAL_FILES+=("$file")
            log_error "  需要人工处理: $file"
        fi
    done
    
    if [[ $MANUAL_COUNT -eq 0 ]]; then
        return 0
    else
        log_error "仍有 $MANUAL_COUNT 个冲突需要人工处理"
        return 1
    fi
}

process_conflicts
EOF

chmod +x scripts/auto-resolve-conflicts.sh

# 6. 创建 GitHub Actions 工作流
cat > .github/workflows/merge-upstream.yml << 'EOF'
name: Merge Upstream Linux 4.19 for Lenovo P12

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 UTC 2:00
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Git
        run: |
          git config --global user.name "Lenovo Kernel Bot"
          git config --global user.email "bot@lenovo-kernel.local"
          git config --global merge.ours.driver "true"
          git config --global merge.theirs.driver "false"
          git config --global merge.text.driver "git merge-file --stdout %A %O %B > %A"
          
      - name: Add upstream
        run: |
          git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
          git fetch upstream linux-4.19.y
          
      - name: Create merge branch
        run: |
          git checkout main  # 或你的主分支名
          MERGE_BRANCH="auto-merge/$(date +%Y%m%d-%H%M%S)"
          git checkout -b $MERGE_BRANCH
          echo "MERGE_BRANCH=$MERGE_BRANCH" >> $GITHUB_ENV
          
      - name: Attempt merge
        id: merge
        continue-on-error: true
        run: |
          git merge upstream/linux-4.19.y --no-edit || true
          
      - name: Auto resolve
        id: resolve
        if: steps.merge.outcome == 'failure'
        run: |
          if scripts/auto-resolve-conflicts.sh; then
            git commit --no-edit -m "Auto-merge upstream linux-4.19.y"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi
          
      - name: Push and create PR
        run: |
          git push origin $MERGE_BRANCH
          gh pr create \
            --title "Auto-merge upstream linux-4.19.y" \
            --body "自动化合并上游更新" \
            --head $MERGE_BRANCH \
            --base main || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
EOF

echo "✅ 脚本已生成，分支: feature/auto-merge-lenovo-p12"