# .github/workflows/auto-merge-on-push.yml
# 当推送到 tb371fc 分支时自动触发上游合并

name: 🔄 提交时自动合并上游

on:
  # 当推送到 tb371fc 分支时自动触发
  push:
    branches:
      - tb371fc
    paths-ignore:
      # 忽略合并机器人自己创建的 PR 分支，避免循环触发
      - 'merge/upstream-**'
      - '.github/workflows/**'
  
  # 仍然保留手动触发能力
  workflow_dispatch:
    description: '手动触发合并（可选）'
    inputs:
      upstream_branch:
        description: '上游分支名称'
        required: false
        default: 'linux-4.19.y'
      skip_auto_resolve:
        description: '跳过自动解决冲突'
        required: false
        default: false
        type: boolean

# 权限配置
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

# 并发控制：避免多个合并同时运行
concurrency:
  group: merge-upstream-tb371fc
  cancel-in-progress: true

# 环境变量
env:
  UPSTREAM_URL: 'https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git'
  UPSTREAM_BRANCH: 'linux-4.19.y'
  TARGET_BRANCH: 'tb371fc'

jobs:
  # ============================================
  # 自动合并任务
  # ============================================
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # ---------- 1. 检出代码 ----------
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          
      # ---------- 2. 检查是否由机器人提交 ----------
      - name: 🔍 检查提交来源
        id: check
        run: |
          # 获取最后一次提交信息
          LAST_COMMIT_MSG=$(git log -1 --format=%s)
          LAST_COMMIT_AUTHOR=$(git log -1 --format=%an)
          
          echo "最后提交: $LAST_COMMIT_MSG"
          echo "提交作者: $LAST_COMMIT_AUTHOR"
          
          # 如果是机器人自己的合并提交，跳过避免循环
          if [[ "$LAST_COMMIT_AUTHOR" == "Lenovo Kernel Merge Bot" ]] || \
             [[ "$LAST_COMMIT_MSG" == *"Auto-merge upstream"* ]] || \
             [[ "$LAST_COMMIT_MSG" == *"[auto]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到机器人提交，跳过自动合并"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "⚠️ 检测到新提交，将检查上游更新"
          fi
          
      # ---------- 3. 配置 Git ----------
      - name: 🔧 配置 Git
        if: steps.check.outputs.skip == 'false'
        run: |
          git config --global user.name "Lenovo Kernel Merge Bot"
          git config --global user.email "kernel-merge@lenovo-p12.local"
          git config --global core.autocrlf false
          
          # 注册合并驱动
          git config --global merge.ours.driver "true"
          git config --global merge.theirs.driver "false"
          git config --global merge.text.name "Text Merge"
          git config --global merge.text.driver "git merge-file --stdout %A %O %B > %A"
          
      # ---------- 4. 添加上游仓库 ----------
      - name: 🔗 添加上游仓库
        if: steps.check.outputs.skip == 'false'
        run: |
          git remote add upstream $UPSTREAM_URL
          git fetch upstream --depth=1000 $UPSTREAM_BRANCH
          echo "✅ 已添加上游: $UPSTREAM_URL"
          echo "📌 上游分支: $UPSTREAM_BRANCH"
          
      # ---------- 5. 获取版本信息 ----------
      - name: 📊 获取版本信息
        id: version
        if: steps.check.outputs.skip == 'false'
        run: |
          CURRENT_COMMIT=$(git rev-parse --short HEAD)
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          
          UPSTREAM_COMMIT=$(git rev-parse --short upstream/$UPSTREAM_BRANCH)
          echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          echo "📌 当前提交 ($TARGET_BRANCH): $CURRENT_COMMIT"
          echo "📌 上游最新提交: $UPSTREAM_COMMIT"
          
      # ---------- 6. 检查是否需要合并 ----------
      - name: 🔍 检查是否需要合并
        id: need_merge
        if: steps.check.outputs.skip == 'false'
        run: |
          # 检查当前分支是否包含上游最新代码
          if git merge-base --is-ancestor upstream/$UPSTREAM_BRANCH HEAD; then
            echo "need_merge=false" >> $GITHUB_OUTPUT
            echo "✅ 当前分支已包含上游所有更新，无需合并"
          else
            # 计算落后多少提交
            BEHIND=$(git rev-list HEAD..upstream/$UPSTREAM_BRANCH --count)
            echo "need_merge=true" >> $GITHUB_OUTPUT
            echo "behind_count=$BEHIND" >> $GITHUB_OUTPUT
            echo "⚠️ 当前分支落后上游 $BEHIND 个提交，需要合并"
          fi
          
      # ---------- 7. 创建合并分支 ----------
      - name: 🌿 创建合并分支
        if: steps.need_merge.outputs.need_merge == 'true'
        run: |
          MERGE_BRANCH="merge/upstream-${{ steps.version.outputs.timestamp }}"
          git checkout -b $MERGE_BRANCH
          echo "MERGE_BRANCH=$MERGE_BRANCH" >> $GITHUB_ENV
          echo "✅ 已创建分支: $MERGE_BRANCH"
          
      # ---------- 8. 执行合并 ----------
      - name: 🔀 执行合并
        if: steps.need_merge.outputs.need_merge == 'true'
        id: merge
        continue-on-error: true
        run: |
          echo "执行: git merge upstream/$UPSTREAM_BRANCH --strategy-option=patience --no-edit"
          
          if git merge upstream/$UPSTREAM_BRANCH \
            --strategy-option=patience \
            --strategy-option=rename-threshold=30 \
            --no-edit 2>&1 | tee merge-output.txt; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            echo "✅ 合并成功，无冲突"
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "has_conflict=true" >> $GITHUB_OUTPUT
            echo "⚠️ 合并时发现冲突"
          fi
          
      # ---------- 9. 自动解决冲突 ----------
      - name: 🤖 自动解决冲突
        if: steps.merge.outputs.has_conflict == 'true' && github.event.inputs.skip_auto_resolve != 'true'
        id: auto-resolve
        run: |
          cat > /tmp/resolve-conflicts.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          echo "🔧 开始自动解决冲突..."
          
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -z "$CONFLICT_FILES" ]; then
            exit 0
          fi
          
          RESOLVED=0
          MANUAL=0
          
          for file in $CONFLICT_FILES; do
            echo "处理: $file"
            
            # defconfig 冲突 - 保留 Lenovo 配置
            if [[ "$file" == *"defconfig" ]]; then
              sed -i '/^<<<<<<< /,/^=======/ {
                /CONFIG_LENOVO/!d
                /CONFIG_TB37/!d
                /CONFIG_MSM/!d
              }' "$file"
              sed -i '/^=======/,/^>>>>>>> /d' "$file"
              sed -i '/^<<<<<<< /d' "$file"
              sed -i '/^=======/d' "$file"
              sed -i '/^>>>>>>> /d' "$file"
              echo "  ✅ 已解决 defconfig 冲突"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # techpack 目录 - 保留厂商版本
            if [[ "$file" == techpack/* ]]; then
              git checkout --ours "$file"
              git add "$file"
              echo "  ✅ 保留厂商版本: $file"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # 设备树 - 保留我们的版本
            if [[ "$file" == arch/arm64/boot/dts/* ]]; then
              git checkout --ours "$file"
              git add "$file"
              echo "  ✅ 保留设备树: $file"
              RESOLVED=$((RESOLVED + 1))
              continue
            fi
            
            # 检查是否还有冲突标记
            if grep -q '<<<<<<<' "$file"; then
              echo "  ❌ 需要人工处理: $file"
              MANUAL=$((MANUAL + 1))
            else
              git add "$file"
              RESOLVED=$((RESOLVED + 1))
            fi
          done
          
          echo "✅ 自动解决: $RESOLVED 个"
          echo "⚠️ 需人工处理: $MANUAL 个"
          
          if [ $MANUAL -gt 0 ]; then
            exit 1
          fi
          exit 0
SCRIPT
          
          chmod +x /tmp/resolve-conflicts.sh
          
          if /tmp/resolve-conflicts.sh; then
            echo "status=success" >> $GITHUB_OUTPUT
            git commit --no-edit -m "[auto] 自动解决合并冲突"
            echo "✅ 所有冲突已自动解决"
          else
            echo "status=partial" >> $GITHUB_OUTPUT
            echo "⚠️ 部分冲突无法自动解决"
          fi
          
      # ---------- 10. 提交合并 ----------
      - name: 💾 提交合并
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.need_merge.outputs.need_merge == 'true'
        run: |
          COMMIT_MSG="Auto-merge upstream $UPSTREAM_BRANCH into $TARGET_BRANCH
          
          触发原因: 检测到 $TARGET_BRANCH 分支有新提交
          上游仓库: $UPSTREAM_URL
          上游提交: ${{ steps.version.outputs.upstream_commit }}
          当前提交: ${{ steps.version.outputs.current_commit }}
          落后数量: ${{ steps.need_merge.outputs.behind_count }} 个提交
          
          ---
          此合并由 GitHub Actions 自动触发
          "
          
          git commit --amend -m "$COMMIT_MSG" 2>/dev/null || git commit -m "$COMMIT_MSG"
          echo "✅ 已创建合并提交"
          
      # ---------- 11. 推送 PR 分支 ----------
      - name: 🚀 推送 PR 分支
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.need_merge.outputs.need_merge == 'true'
        run: |
          git push origin $MERGE_BRANCH
          echo "✅ 已推送分支: $MERGE_BRANCH"
          
      # ---------- 12. 创建 Pull Request ----------
      - name: 🔀 创建 Pull Request
        if: (steps.merge.outputs.status == 'success' || steps.auto-resolve.outputs.status == 'success') && steps.need_merge.outputs.need_merge == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-merge upstream ${{ env.UPSTREAM_BRANCH }}"
          title: "🔀 [自动] 上游 ${{ env.UPSTREAM_BRANCH }} 更新"
          body: |
            ## 📦 上游内核更新合并请求
            
            ### 触发信息
            
            此 PR 由推送到 `${{ env.TARGET_BRANCH }}` 分支自动触发。
            
            ### 合并信息
            
            | 项目 | 信息 |
            |------|------|
            | 触发分支 | `${{ env.TARGET_BRANCH }}` |
            | 上游仓库 | `${{ env.UPSTREAM_URL }}` |
            | 上游分支 | `${{ env.UPSTREAM_BRANCH }}` |
            | 上游提交 | `${{ steps.version.outputs.upstream_commit }}` |
            | 当前提交 | `${{ steps.version.outputs.current_commit }}` |
            | 落后数量 | `${{ steps.need_merge.outputs.behind_count }}` 个提交 |
            
            ### 冲突状态
            
            ${{ steps.merge.outputs.has_conflict == 'true' && '⚠️ 合并时发现冲突，已尝试自动解决' || '✅ 合并无冲突' }}
            ${{ steps.auto-resolve.outputs.status == 'success' && '✅ 所有冲突已自动解决' || '' }}
            
            ### 审核清单
            
            - [ ] 检查代码变更
            - [ ] 验证编译通过
            - [ ] **手动合并此 PR**
            
            ### 手动合并命令
            
            ```bash
            git checkout ${{ env.TARGET_BRANCH }}
            git pull origin ${{ env.TARGET_BRANCH }}
            git merge --no-ff ${{ env.MERGE_BRANCH }}
            git push origin ${{ env.TARGET_BRANCH }}
            ```
            
            ---
            *此 PR 由 GitHub Actions 自动创建*
          branch: ${{ env.MERGE_BRANCH }}
          base: ${{ env.TARGET_BRANCH }}
          labels: |
            auto-created
            upstream-update
            needs-manual-merge
          delete-branch: true
          
      # ---------- 13. 合并失败时创建 Issue ----------
      - name: 🚨 合并失败创建 Issue
        if: steps.auto-resolve.outputs.status == 'partial' || (steps.merge.outputs.has_conflict == 'true' && github.event.inputs.skip_auto_resolve == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let conflictInfo = '';
            try {
              const output = fs.readFileSync('merge-output.txt', 'utf8');
              conflictInfo = output.slice(-800);
            } catch(e) {
              conflictInfo = '无法读取合并输出';
            }
            
            let body = `## ⚠️ 自动合并失败
            
            推送到 **${process.env.TARGET_BRANCH}** 分支后，尝试合并上游 **${process.env.UPSTREAM_BRANCH}** 时发现冲突，无法自动解决。
            
            ### 合并信息
            
            - **目标分支**: ${process.env.TARGET_BRANCH}
            - **上游分支**: ${process.env.UPSTREAM_BRANCH}
            - **上游提交**: ${{ steps.version.outputs.upstream_commit }}
            
            ### 冲突详情
            
            \`\`\`
            ${conflictInfo}
            \`\`\`
            
            ### 解决步骤
            
            \`\`\`bash
            # 1. 克隆仓库
            git clone ${{ github.server_url }}/${{ github.repository }}.git
            cd ${{ github.repository }}
            git checkout ${process.env.TARGET_BRANCH}
            
            # 2. 添加上游并合并
            git remote add upstream ${process.env.UPSTREAM_URL}
            git fetch upstream ${process.env.UPSTREAM_BRANCH}
            git merge upstream/${process.env.UPSTREAM_BRANCH}
            
            # 3. 手动解决冲突后
            git add .
            git merge --continue
            git push origin ${process.env.TARGET_BRANCH}
            \`\`\`
            
            ---
            🤖 此 Issue 由自动化系统创建
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto-Merge Failed] 需要手动解决冲突 - ${new Date().toISOString().slice(0, 10)}`,
              body: body,
              labels: ['merge-conflict', 'auto-merge-failed']
            });
        env:
          UPSTREAM_BRANCH: ${{ env.UPSTREAM_BRANCH }}
          UPSTREAM_URL: ${{ env.UPSTREAM_URL }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          
      # ---------- 14. 输出总结 ----------
      - name: 📋 输出总结
        run: |
          echo "=========================================="
          echo "📊 自动合并执行总结"
          echo "=========================================="
          echo "目标分支: $TARGET_BRANCH"
          echo "触发方式: ${{ github.event_name }}"
          echo "合并状态: ${{ steps.merge.outputs.status || '无需合并' }}"
          echo "冲突状态: ${{ steps.merge.outputs.has_conflict || '无' }}"
          echo "=========================================="
          
          if [ "${{ steps.need_merge.outputs.need_merge }}" == "false" ]; then
            echo "✅ 当前已是最新，无需合并"
          elif [ "${{ steps.merge.outputs.status }}" == "success" ] || [ "${{ steps.auto-resolve.outputs.status }}" == "success" ]; then
            echo "✅ 合并成功，已创建 PR 请手动审核"
          else
            echo "⚠️ 合并失败，请查看上方 Issue 手动处理"
          fi
          echo "=========================================="
          
      # ---------- 15. 上传日志 ----------
      - name: 📤 上传合并日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-logs-${{ steps.version.outputs.timestamp }}
          path: |
            merge-output.txt
          retention-days: 7