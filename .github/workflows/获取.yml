name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone kernel-4.19 folder content
      run: |
        # 使用稀疏检出只获取kernel-4.19文件夹
        git clone --filter=blob:none --sparse https://github.com/StefanYohansson/linux-lenovo-tb370fu.git kernel-temp
        cd kernel-temp
        git sparse-checkout set kernel-4.19
        git checkout main
        
        # 将kernel-4.19文件夹内容复制到当前目录
        cd ..
        cp -r kernel-temp/kernel-4.19/* .
        
        # 清理临时文件夹
        rm -rf kernel-temp
        
        # 配置git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加、提交并推送所有更改
        git add .
        git commit -m "Sync kernel-4.19 folder content from StefanYohansson/linux-lenovo-tb370fu" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }}