name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone and force push android14-base branch
      run: |
        # 浅克隆源分支（加速）
        git clone --branch android14-base --single-branch --depth 1 \
          https://github.com/revolwoc/kernel_xiaomi_sm8250.git kernel-temp
        
        cd kernel-temp
        
        # 更新远程地址
        git remote set-url origin \
          https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        
        # 允许无关历史并强制推送
        git push origin android14-base --force --allow-unrelated-histories