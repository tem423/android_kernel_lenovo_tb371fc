name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone and force push android14-base branch
      run: |
        git clone --branch android-4.19-stable --single-branch https://github.com/ila-embsys/linux-android-msm-lenovo-p12.git kernel-temp
        cd kernel-temp
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        git push origin android-4.19-stable --force
