name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone and force push tb370fu branch
      run: |
        git clone --branch main --single-branch https://github.com/StefanYohansson/linux-lenovo-tb370fu.git kernel-temp
        cd kernel-temp/kernel-4.19
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        git push origin main --force