name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone and force push to android16-base branch
      run: |
        # 克隆LineageOS内核仓库的特定commit
        git clone https://github.com/LineageOS/android_kernel_qcom_sm8250.git kernel-temp
        cd kernel-temp
        
        # 检出特定的commit
        git checkout c22009ad76c9aaa2b601db8353f949d6f3c8835e
        
        # 创建新分支
        git checkout -b android16-base
        
        # 设置远程仓库为您的GitHub仓库
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        
        # 强制推送到android16-base分支
        git push origin android16-base --force