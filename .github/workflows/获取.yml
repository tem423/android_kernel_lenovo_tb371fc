name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Create and switch to new branch
      run: |
        git checkout -b kernel-4.19-sync
        git push origin kernel-4.19-sync

    - name: Clone kernel-4.19 folder content
      run: |
        # 删除所有现有文件（保留.git文件夹）
        find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true
        
        # 克隆源仓库的kernel-4.19文件夹
        git clone --filter=blob:none --sparse https://github.com/StefanYohansson/linux-lenovo-tb370fu.git kernel-temp
        cd kernel-temp
        git sparse-checkout set kernel-4.19
        git checkout main
        
        # 复制内容到当前目录
        cd ..
        cp -r kernel-temp/kernel-4.19/* .
        cp -r kernel-temp/kernel-4.19/.[!.]* . 2>/dev/null || true
        
        # 清理
        rm -rf kernel-temp
        
        # 配置git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 提交并推送到新分支
        git add .
        git commit -m "Sync kernel-4.19 folder content from StefanYohansson/linux-lenovo-tb370fu"
        git push origin HEAD:kernel-4.19-sync