name: Sync Kernel from Specific Commit

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Clone and force push android16-aptusitu branch
      run: |
        git clone --branch android16-aptusitu --single-branch https://github.com/ApartTUSITU/kernel_xiaomi_sm8250_mod.git kernel-temp
        cd kernel-temp
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        git push origin android16-aptusitu --force