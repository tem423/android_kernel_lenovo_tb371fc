name: Sync Linux 4.19 Upstream

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游分支/标签'
        required: true
        default: 'linux-4.19.y'

jobs:
  sync-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Add Linux stable kernel as remote
      run: |
        git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
        git fetch upstream --tags --force
        
    - name: Create/Update linux-4.19.y branch
      run: |
        if git show-ref --verify --quiet refs/heads/linux-4.19.y; then
          git checkout linux-4.19.y
          git reset --hard upstream/linux-4.19.y
        else
          git checkout -b linux-4.19.y upstream/linux-4.19.y
        fi
        
    - name: Push to your repository
      run: |
        git push origin linux-4.19.y --force
