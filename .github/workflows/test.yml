name: Android Kernel Build Action

on:
   push:
  branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: tem423/kernel_build_action@main
        with:
          kernel-url: https://github.com/tem423/linux-android-msm-lenovo-p12
          kernel-branch: tb371fc
          config: vendor/tb371fc_defconfig
          arch: arm64
          android-version: 11
          ccache: true
          ksu: false
          ksu-version: v0.9.5
          # aosp
          # aosp-gcc: true
          # aosp-clang: true
          # aosp-clang-version: r383902
          # ndk
          # android-ndk: true
          # android-ndk-version:         r23b
          other-clang-url: https://github.com/sticpaper/Snapdragon-LLVM-ARM-Compiler-10.0.7-for-Android-NDK
          other-clang-branch: main
          anykernel3: true
          bootimg-url: https://github.com/tem423/KernelSU_Action/releases/download/boot/boot.img
          release: false
          access-token: ${{ secrets.GITHUB_TOKEN }}