name: Batch Cherry-pick from Remote Branch

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址 (例如: https://github.com/user/repo.git)'
        required: true
        default: 'https://github.com/jsdizkcksv/kernel_xiaomi_sm8250.git'
      source_branch:
        description: '源分支名称'
        required: true
        default: 'backport-5.10-bpf'
      commit_start:
        description: '起始 Commit (包含)'
        required: true
        default: '1a6da61'
      commit_end:
        description: '结束 Commit (包含)'
        required: true
        default: 'e7087c9'
      target_branch:
        description: '目标分支 (将合入的分支)'
        required: true
        default: 'bpf'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add source repository
        run: |
          git remote add source-repo ${{ github.event.inputs.source_repo }}
          git fetch source-repo ${{ github.event.inputs.source_branch }}

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick commits and push on conflict
        run: |
          # 🔧 要跳过的提交（完整哈希）
          SKIP_COMMIT="418171e956e573a77898eeec7aa30839028de63f"
          
          COMMITS=$(git rev-list --reverse ${{ github.event.inputs.commit_start }}^..${{ github.event.inputs.commit_end }})
          TOTAL=$(echo "$COMMITS" | wc -l)
          CURRENT=0
          APPLIED=0
          SKIPPED=0
          CONFLICT_COMMIT=""
          
          echo "📊 总共需要处理 $TOTAL 个提交"
          echo "⏭️ 跳过的提交: $SKIP_COMMIT"
          echo "========================================"
          
          for COMMIT in $COMMITS; do
            CURRENT=$((CURRENT + 1))
            echo "--- [$CURRENT/$TOTAL] 正在处理: $COMMIT ---"
            
            # 检查是否在跳过列表中
            if echo "$COMMIT" | grep -q "^$SKIP_COMMIT"; then
              echo "⏭️ 提交 $COMMIT 在跳过列表中，跳过"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            
            if git cherry-pick $COMMIT; then
              echo "✅ 提交 $COMMIT 应用成功"
              APPLIED=$((APPLIED + 1))
            else
              # 检查是否为空提交
              if git diff --cached --quiet 2>/dev/null; then
                echo "⚠️ 提交 $COMMIT 为空提交，自动跳过"
                git cherry-pick --skip 2>/dev/null || true
                SKIPPED=$((SKIPPED + 1))
              else
                echo "::error::❌ 提交 $COMMIT 发生冲突！"
                echo "📋 冲突文件列表："
                git diff --name-only --diff-filter=U
                echo ""
                
                CONFLICT_COMMIT="$COMMIT"
                break
              fi
            fi
          done
          
          # 推送已应用的提交
          if [ $APPLIED -gt 0 ]; then
            echo "========================================"
            echo "📦 推送已应用的 $APPLIED 个提交到远程..."
            git push origin ${{ github.event.inputs.target_branch }}
            echo "✅ 已推送 $APPLIED 个提交"
          fi
          
          # 如果有冲突，退出并报错
          if [ -n "$CONFLICT_COMMIT" ]; then
            echo ""
            echo "========================================"
            echo "::error::❌ 在提交 $CONFLICT_COMMIT 处发生冲突"
            echo "💡 已推送的 $APPLIED 个提交已上传到远程仓库"
            echo "⏭️ 已跳过 $SKIPPED 个提交"
            echo ""
            echo "📋 本地解决冲突后继续："
            echo "  git pull origin ${{ github.event.inputs.target_branch }}"
            echo "  # 解决冲突文件"
            echo "  git add . && git cherry-pick --continue"
            echo "  git push origin ${{ github.event.inputs.target_branch }}"
            echo ""
            echo "或跳过此提交："
            echo "  git cherry-pick --skip"
            echo "  git push origin ${{ github.event.inputs.target_branch }}"
            exit 1
          fi
          
          echo "========================================"
          echo "🎉 Cherry-pick 全部完成！"
          echo "✅ 成功应用: $APPLIED 个"
          echo "⏭️ 跳过提交: $SKIPPED 个"

      - name: Push changes (if all succeeded)
        if: success()
        run: |
          git push origin ${{ github.event.inputs.target_branch }}