name: Batch Cherry-pick from Remote Branch

on:
  # 允许您通过 GitHub 界面手动触发，并输入参数
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址 (例如: https://github.com/user/repo.git)'
        required: true
        default: 'https://github.com/jsdizkcksv/kernel_xiaomi_sm8250.git'
      source_branch:
        description: '源分支名称'
        required: true
        default: 'backport-5.10-bpf'
      commit_start:
        description: '起始 Commit (包含)'
        required: true
        default: '1a6da61'
      commit_end:
        description: '结束 Commit (包含)'
        required: true
        default: 'e7087c9'
      target_branch:
        description: '目标分支 (将合入的分支)'
        required: true
        default: 'bpf'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库（目标仓库）
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          # 获取完整历史以便 cherry-pick
          fetch-depth: 0

      # 2. 添加源仓库为另一个远程仓库
      - name: Add source repository
        run: |
          git remote add source-repo ${{ github.event.inputs.source_repo }}
          git fetch source-repo ${{ github.event.inputs.source_branch }}

      # 3. 执行批量 Cherry-pick
      - name: Cherry-pick commits
        run: |
          # 构造提交范围，例如 1a6da61^..e7087c9
          COMMIT_RANGE="${{ github.event.inputs.commit_start }}^..${{ github.event.inputs.commit_end }}"
          echo "尝试 Cherry-pick 范围: $COMMIT_RANGE"
          
          # 尝试批量 cherry-pick
          if ! git cherry-pick $COMMIT_RANGE; then
            echo "::warning::Cherry-pick 过程中发生冲突，请手动解决。"
            echo "冲突解决后，执行 'git cherry-pick --continue' 并推送。"
            # 在 Actions 中，这里会停止并保留工作区，但通常建议本地处理
            exit 1
          fi

      # 4. 推送更改到目标分支
      - name: Push changes
        if: success()
        run: |
          git push origin ${{ github.event.inputs.target_branch }}