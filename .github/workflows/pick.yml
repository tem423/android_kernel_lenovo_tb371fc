name: Batch Cherry-pick from Remote Branch

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址 (例如: https://github.com/user/repo.git)'
        required: true
        default: 'https://github.com/jsdizkcksv/kernel_xiaomi_sm8250.git'
      source_branch:
        description: '源分支名称'
        required: true
        default: 'backport-5.10-bpf'
      commit_start:
        description: '起始 Commit (包含)'
        required: true
        default: '1a6da61'
      commit_end:
        description: '结束 Commit (包含)'
        required: true
        default: 'e7087c9'
      target_branch:
        description: '目标分支 (将合入的分支)'
        required: true
        default: 'bpf'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add source repository
        run: |
          git remote add source-repo ${{ github.event.inputs.source_repo }}
          git fetch source-repo ${{ github.event.inputs.source_branch }}

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick commits (auto-skip all)
        run: |
          COMMITS=$(git rev-list --reverse ${{ github.event.inputs.commit_start }}^..${{ github.event.inputs.commit_end }})
          TOTAL=$(echo "$COMMITS" | wc -l)
          CURRENT=0
          SKIPPED_EMPTY=0
          SKIPPED_CONFLICT=0
          APPLIED=0
          
          echo "📊 总共需要处理 $TOTAL 个提交"
          echo "========================================"
          
          for COMMIT in $COMMITS; do
            CURRENT=$((CURRENT + 1))
            echo "--- [$CURRENT/$TOTAL] 正在处理: $COMMIT ---"
            
            # 尝试 cherry-pick
            if git cherry-pick $COMMIT; then
              echo "✅ 提交 $COMMIT 应用成功"
              APPLIED=$((APPLIED + 1))
            else
              # 检查是否为空提交
              if git diff --cached --quiet 2>/dev/null; then
                echo "⚠️ 提交 $COMMIT 为空提交，自动跳过"
                git cherry-pick --skip 2>/dev/null || true
                SKIPPED_EMPTY=$((SKIPPED_EMPTY + 1))
              else
                # 有冲突，自动跳过
                echo "⚠️ 提交 $COMMIT 有冲突，自动跳过"
                git cherry-pick --abort 2>/dev/null || true
                SKIPPED_CONFLICT=$((SKIPPED_CONFLICT + 1))
              fi
            fi
          done
          
          echo "========================================"
          echo "🎉 Cherry-pick 全部完成！"
          echo "✅ 成功应用: $APPLIED 个"
          echo "⏭️ 跳过空提交: $SKIPPED_EMPTY 个"
          echo "⏭️ 跳过冲突提交: $SKIPPED_CONFLICT 个"
          echo "📊 总跳过: $((SKIPPED_EMPTY + SKIPPED_CONFLICT)) 个"

      - name: Push changes
        if: success()
        run: |
          git push origin ${{ github.event.inputs.target_branch }}