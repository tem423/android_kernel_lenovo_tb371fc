name: Batch Cherry-pick from Remote Branch

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址 (例如: https://github.com/user/repo.git)'
        required: true
        default: 'https://github.com/jsdizkcksv/kernel_xiaomi_sm8250.git'
      source_branch:
        description: '源分支名称'
        required: true
        default: 'backport-5.10-bpf'
      commit_start:
        description: '起始 Commit (包含)'
        required: true
        default: '1a6da61'
      commit_end:
        description: '结束 Commit (包含)'
        required: true
        default: 'e7087c9'
      target_branch:
        description: '目标分支 (将合入的分支)'
        required: true
        default: 'bpf'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add source repository
        run: |
          git remote add source-repo ${{ github.event.inputs.source_repo }}
          git fetch source-repo ${{ github.event.inputs.source_branch }}

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick commits (skip specific commits)
        id: cherrypick
        run: |
          # 🔧 要跳过的提交（完整哈希，用空格分隔）
          SKIP_LIST="418171e956e573a77898eeec7aa30839028de63f"
          
          COMMITS=$(git rev-list --reverse ${{ github.event.inputs.commit_start }}^..${{ github.event.inputs.commit_end }})
          TOTAL=$(echo "$COMMITS" | wc -l)
          CURRENT=0
          SKIPPED=0
          APPLIED=0
          CONFLICT_COMMIT=""
          
          echo "📊 总共需要处理 $TOTAL 个提交"
          echo "⏭️ 跳过的提交: $SKIP_LIST"
          echo "========================================"
          
          for COMMIT in $COMMITS; do
            CURRENT=$((CURRENT + 1))
            echo "--- [$CURRENT/$TOTAL] 正在处理: $COMMIT ---"
            
            # 检查是否在跳过列表中（前缀匹配）
            SKIPPED_COMMIT=false
            for SKIP in $SKIP_LIST; do
              if echo "$COMMIT" | grep -q "^$SKIP"; then
                SKIPPED_COMMIT=true
                break
              fi
            done
            
            if [ "$SKIPPED_COMMIT" = true ]; then
              echo "⏭️ 提交 $COMMIT 在跳过列表中，跳过"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            
            if git cherry-pick $COMMIT; then
              echo "✅ 提交 $COMMIT 应用成功"
              APPLIED=$((APPLIED + 1))
            else
              if git diff --cached --quiet 2>/dev/null; then
                echo "⚠️ 提交 $COMMIT 为空提交，自动跳过"
                git cherry-pick --skip 2>/dev/null || true
                SKIPPED=$((SKIPPED + 1))
              else
                echo "::error::❌ 提交 $COMMIT 发生冲突，停止执行！"
                echo "📋 冲突文件列表："
                git diff --name-only --diff-filter=U
                echo ""
                echo "💡 请在本地执行以下命令："
                echo "  git checkout ${{ github.event.inputs.target_branch }}"
                echo "  # 解决冲突后执行："
                echo "  git add . && git cherry-pick --continue"
                echo "  git push origin ${{ github.event.inputs.target_branch }}"
                
                # 保存冲突提交哈希，用于导出
                echo "CONFLICT_COMMIT=$COMMIT" >> $GITHUB_ENV
                CONFLICT_COMMIT="$COMMIT"
                
                # 导出冲突文件
                mkdir -p conflict_files
                git diff --name-only --diff-filter=U | while read FILE; do
                  mkdir -p "conflict_files/$(dirname "$FILE")"
                  cat "$FILE" > "conflict_files/$FILE" 2>/dev/null || echo "文件不存在" > "conflict_files/$FILE"
                done
                
                # 保存冲突信息
                echo "冲突提交: $COMMIT" > conflict_files/CONFLICT_INFO.txt
                echo "冲突时间: $(date)" >> conflict_files/CONFLICT_INFO.txt
                echo "" >> conflict_files/CONFLICT_INFO.txt
                echo "冲突文件列表:" >> conflict_files/CONFLICT_INFO.txt
                git diff --name-only --diff-filter=U >> conflict_files/CONFLICT_INFO.txt
                echo "" >> conflict_files/CONFLICT_INFO.txt
                echo "冲突内容:" >> conflict_files/CONFLICT_INFO.txt
                git diff >> conflict_files/CONFLICT_INFO.txt
                
                exit 1
              fi
            fi
          done
          
          echo "========================================"
          echo "🎉 Cherry-pick 全部完成！"
          echo "✅ 成功应用: $APPLIED 个"
          echo "⏭️ 跳过提交: $SKIPPED 个"

      - name: Upload conflict files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: conflict-files
          path: conflict_files/
          retention-days: 7

      - name: Push changes
        if: success()
        run: |
          git push origin ${{ github.event.inputs.target_branch }}