name: Batch Cherry-pick from Local Branch

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: '目标分支 (将合入的分支)'
        required: true
        default: 'android14-base'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch source branch
        run: |
          git fetch origin android16-aptusitu

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick specific commits and push (skip Makefile)
        run: |
          # 定义要 cherry-pick 的提交列表
          COMMIT_LIST="
          b37477f5316fe37f74645a5d9d92a3a9c93d8cfa
          302e1d977385ef80349cc9fadd5204c2e3404433
          05a68fe2c1f4661c5641ad0d9fb0241503f126d7
          46d5c1546743336f866e6b827c0242acf2196432
          18b61cc1d099695ff930e9043ee9bc522b953a9b
          82f9317bbbe5b556e0433166f844cb775c2f7abe
          bd67cb15e90fa8b47b84e8554569ef5657a05c80
          da78120b9286aae93522c62ed9cc9a12d2e52026
          62b9122a2a133e96c3b439477e2d931041765a12
          bbc4834e22f0355a4971f4e4f6fd396ffd58d0c6
          7b8888c696afdda7d4b2f517499da7f5c6b36720
          d757552385b8c5fbe8bb6b172240cac050d22eb2
          de2cffe297563c815c840cfa14b77a0868b61e53
          1b3964c5e070d088ca4c9591cbadd91a22e438ea
          a8c422f8f7233300271453594f40da83c513d22c
          2d76dea417beb11b47beb4933a41f184bec6966a
          708f578f2a8f702d2f2a0ef5e6eac28e08206e03
          4f94b88d7d8730cd7b1adbb86d4ceef639a7c1f9
          a67e7cdde7cc7984ae24c3c81a70dc1aa34424b1
          874391c94eb1520fcf37467be70427e8787900f2
          "
          
          # 去除空行和空格
          COMMIT_LIST=$(echo "$COMMIT_LIST" | grep -v '^$' | tr -d ' ')
          TOTAL=$(echo "$COMMIT_LIST" | wc -l)
          CURRENT=0
          APPLIED=0
          SKIPPED=0
          SKIPPED_MAKEFILE=0
          CONFLICT_COMMIT=""
          
          echo "📊 总共需要处理 $TOTAL 个提交"
          echo "⏭️ 将跳过仅包含 Makefile 更改的提交"
          echo "========================================"
          
          # 显示当前状态
          echo "🔍 当前分支: $(git branch --show-current)"
          echo "🔍 工作区状态:"
          git status --porcelain || echo "无变更"
          echo ""
          
          for COMMIT in $COMMIT_LIST; do
            CURRENT=$((CURRENT + 1))
            
            echo "--- [$CURRENT/$TOTAL] 正在处理: $COMMIT ---"
            
            # 显示提交信息
            echo "📝 提交说明:"
            git log --oneline -1 $COMMIT 2>/dev/null || echo "⚠️ 无法获取提交信息（可能提交不存在）"
            echo ""
            
            # 检查这个提交是否只修改了 Makefile
            echo "🔍 检查提交是否只涉及 Makefile..."
            MODIFIED_FILES=$(git diff-tree --no-commit-id --name-only -r $COMMIT 2>/dev/null || echo "")
            
            # 检查是否有非 Makefile 的修改
            # Makefile 可能是名为 Makefile 的文件或以 Makefile 结尾的文件
            NON_MAKEFILE_FILES=$(echo "$MODIFIED_FILES" | grep -v "Makefile$" | grep -v "^$" || echo "")
            
            if [ -z "$NON_MAKEFILE_FILES" ] && [ -n "$MODIFIED_FILES" ]; then
              echo "⏭️ 提交 $COMMIT 只修改了 Makefile，跳过"
              echo "📁 修改的文件:"
              echo "$MODIFIED_FILES" | sed 's/^/  /'
              SKIPPED_MAKEFILE=$((SKIPPED_MAKEFILE + 1))
              SKIPPED=$((SKIPPED + 1))
              echo ""
              continue
            elif [ -z "$MODIFIED_FILES" ]; then
              echo "⚠️ 无法获取提交的文件列表，可能提交不存在"
              echo ""
              continue
            else
              echo "✅ 提交包含非 Makefile 的修改，将进行 cherry-pick"
              echo "📁 修改的文件（非 Makefile）:"
              echo "$NON_MAKEFILE_FILES" | sed 's/^/  /'
              echo ""
            fi
            
            # 检查是否是 merge commit
            PARENT_COUNT=$(git show --format=%P -s $COMMIT 2>/dev/null | wc -w)
            CHERRY_CMD="git cherry-pick $COMMIT"
            
            if [ "$PARENT_COUNT" -gt 1 ]; then
              echo "🔀 检测到 merge commit (有 $PARENT_COUNT 个父提交)，使用 -m 1 选项"
              CHERRY_CMD="git cherry-pick -m 1 $COMMIT"
            fi
            
            # 执行 cherry-pick
            set +e
            CHERRY_OUTPUT=$($CHERRY_CMD 2>&1)
            CHERRY_EXIT_CODE=$?
            set -e
            
            # 显示输出
            if [ -n "$CHERRY_OUTPUT" ]; then
              echo "📤 命令输出:"
              echo "$CHERRY_OUTPUT"
            fi
            echo "🔢 退出码: $CHERRY_EXIT_CODE"
            
            # 情况1: 完全成功
            if [ $CHERRY_EXIT_CODE -eq 0 ]; then
              echo "✅ 提交 $COMMIT 应用成功"
              APPLIED=$((APPLIED + 1))
              echo ""
              continue
            fi
            
            # 情况2: 空提交（更改已存在），自动跳过
            if echo "$CHERRY_OUTPUT" | grep -q "The previous cherry-pick is now empty"; then
              echo "⏭️ 提交 $COMMIT 为空（更改已存在），自动跳过"
              git cherry-pick --skip 2>/dev/null || true
              SKIPPED=$((SKIPPED + 1))
              echo ""
              continue
            fi
            
            # 情况3: 代码冲突
            if echo "$CHERRY_OUTPUT" | grep -q "CONFLICT"; then
              echo "::error::❌ 提交 $COMMIT 发生冲突！"
              echo "📋 冲突文件列表："
              git diff --name-only --diff-filter=U || echo "无法获取冲突文件列表"
              echo ""
              
              CONFLICT_COMMIT="$COMMIT"
              break
            fi
            
            # 情况4: 其他错误
            echo "::error::❌ 提交 $COMMIT 处理失败！"
            echo "错误详情: $CHERRY_OUTPUT"
            echo ""
            
            # 尝试中止 cherry-pick 恢复工作区
            if git cherry-pick --abort 2>/dev/null; then
              echo "已执行 git cherry-pick --abort 恢复工作区"
            fi
            
            CONFLICT_COMMIT="$COMMIT"
            break
          done
          
          # 推送已应用的提交
          if [ $APPLIED -gt 0 ]; then
            echo "========================================"
            echo "📦 推送已应用的 $APPLIED 个提交到远程..."
            if git push origin ${{ github.event.inputs.target_branch }}; then
              echo "✅ 已推送 $APPLIED 个提交"
            else
              echo "::error::❌ 推送失败！请手动推送"
              exit 1
            fi
          fi
          
          # 如果有冲突，退出并报错
          if [ -n "$CONFLICT_COMMIT" ]; then
            echo ""
            echo "========================================"
            echo "::error::❌ 在提交 $CONFLICT_COMMIT 处发生冲突"
            echo "💡 已推送的 $APPLIED 个提交已上传到远程仓库"
            echo "📊 统计: 成功应用 $APPLIED 个，跳过 $SKIPPED 个 (其中仅 Makefile 的提交: $SKIPPED_MAKEFILE 个)"
            echo ""
            echo "📋 本地解决冲突后继续："
            echo "  git pull origin ${{ github.event.inputs.target_branch }}"
            echo "  # 解决冲突文件"
            echo "  git add . && git cherry-pick --continue"
            echo "  git push origin ${{ github.event.inputs.target_branch }}"
            echo ""
            echo "或跳过此提交："
            echo "  git cherry-pick --skip"
            echo "  git push origin ${{ github.event.inputs.target_branch }}"
            exit 1
          fi
          
          echo "========================================"
          echo "🎉 Cherry-pick 全部完成！"
          echo "✅ 成功应用: $APPLIED 个"
          echo "⏭️ 跳过: $SKIPPED 个 (其中仅 Makefile 的提交: $SKIPPED_MAKEFILE 个)"

      - name: Push changes (if all succeeded)
        if: success()
        run: |
          git push origin ${{ github.event.inputs.target_branch }}