name: Sync LineageOS Kernel

on:
  workflow_dispatch:

jobs:
  sync-kernel:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}  # 使用你创建的 PAT
        fetch-depth: 0
        
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Add LineageOS kernel as remote
      run: |
        git remote add lineage https://github.com/LineageOS/android_kernel_qcom_sm8250.git
        git fetch lineage lineage-20
        git fetch origin lineage-20 2>/dev/null || true
        git push origin :lineage-20 2>/dev/null || true
        git push origin lineage-20 --force
        
    - name: Create/Update lineage-20 branch
      run: |
        if git show-ref --verify --quiet refs/heads/lineage-20; then
          git checkout lineage-20
          git reset --hard lineage/lineage-20
        else
          git checkout -b lineage-20 lineage/lineage-20
        fi
        
    - name: Push to your repository
      run: |
        git push origin lineage-20 --force