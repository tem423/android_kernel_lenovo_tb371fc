name: 合并 lineage-20 到电池修复测试（保留目标分支）

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '源分支'
        required: true
        default: 'lineage-20'
      target_branch:
        description: '目标分支'
        required: true
        default: '电池修复测试'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-branches:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tem423/linux-android-msm-lenovo-p12
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 拉取源分支
        run: |
          git fetch origin ${{ github.event.inputs.source_branch }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 执行合并（保留目标分支内容）
        id: merge
        continue-on-error: true
        run: |
          git merge --no-commit --no-ff origin/${{ github.event.inputs.source_branch }} || true
          
          echo "=== 优先保留目标分支（${{ github.event.inputs.target_branch }}）文件 ==="
          
          if git diff --cached --name-only --diff-filter=U | grep -q .; then
            echo "发现冲突，保留目标分支版本"
            git checkout --ours .
            git add .
            echo "status=resolved" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送
        if: steps.merge.outputs.status == 'success' || steps.merge.outputs.status == 'resolved'
        run: |
          git commit -m "Merge branch '${{ github.event.inputs.source_branch }}' into '${{ github.event.inputs.target_branch }}' - 保留目标分支内容解决冲突"
          git push origin ${{ github.event.inputs.target_branch }}
          echo "✅ 合并成功！已推送到 ${{ github.event.inputs.target_branch }}"

      - name: 如果合并完全失败，创建 PR
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "WIP: 合并 ${{ github.event.inputs.source_branch }} 到 ${{ github.event.inputs.target_branch }}"
          title: "合并 ${{ github.event.inputs.source_branch }} 到 ${{ github.event.inputs.target_branch }}（需要手动处理）"
          body: |
            自动合并时发生错误，请手动处理。
            
            ## 合并命令
            ```bash
            git checkout ${{ github.event.inputs.target_branch }}
            git merge origin/${{ github.event.inputs.source_branch }}
            ```
          branch: auto-merge-fallback
          base: ${{ github.event.inputs.target_branch }}
          labels: manual-merge, conflict